name: Daily Stock Ticker Load

on:
  schedule:
    # 17:45 / 18:45 UTC covers 10:45 America/Los_Angeles (PDT vs PST); gate pins to that local minute
    - cron: "45 17,18 * * *"
  workflow_dispatch:

jobs:
  load-to-snowflake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run only at 10:45 Pacific
        id: gate
        run: |
          python - <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo

          now_pt = datetime.now(ZoneInfo("America/Los_Angeles"))
          should_run = now_pt.hour == 10 and now_pt.minute == 45
          with open("gate_output.txt", "w", encoding="utf-8") as f:
            f.write("true" if should_run else "false")
          print(f"Current Pacific time: {now_pt.isoformat()} | should_run={should_run}")
          PY
          echo "should_run=$(cat gate_output.txt)" >> "$GITHUB_OUTPUT"

      - name: Skip load (scheduled run outside 10:45 Pacific)
        if: github.event_name != 'workflow_dispatch' && steps.gate.outputs.should_run != 'true'
        run: echo "Not 10:45 Pacific — skipping load. Manual runs always execute the load step."


      - name: Verify Secrets are Loaded
        if: github.event_name == 'workflow_dispatch' || steps.gate.outputs.should_run == 'true'
        env:
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
        run: |
          if [ -z "$MASSIVE_API_KEY" ]; then
            echo "❌ ERROR: MASSIVE_API_KEY is EMPTY in GitHub Secrets!"
            exit 1
          else
            echo "✅ SUCCESS: MASSIVE_API_KEY is found (Length: ${#MASSIVE_API_KEY} characters)"
          fi
      # Manual "Run workflow" should always load. Scheduled runs only at 10:45 Pacific.
      - name: Execute ticker load
        if: github.event_name == 'workflow_dispatch' || steps.gate.outputs.should_run == 'true'
        env:
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
          SNOWFLAKE_TABLE: ${{ secrets.SNOWFLAKE_TABLE }}
        run: python script.py
